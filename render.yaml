# Render Blueprint - optional one-click deploy
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: loya-eye-hospital
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: loya-eye-db
          property: connectionString
    # Add ALLOWED_HOSTS, CSRF_TRUSTED_ORIGINS in Render dashboard

databases:
  - name: loya-eye-db
    plan: free
    databaseName: loya_eye_db
    user: loya_eye
